<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Follistatin | Bluerexall</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      background: #111827;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
      background: #1f2937;
      min-height: 120px;
      object-fit: cover;
      display: block;
    }

    .error-box {
      text-align: center;
      color: #ff4d4d;
      padding: 10px;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111827;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>
  <h1>Follistatin</h1>
  <p>Research Use Only</p>
</header>

<section class="gallery">

  <img src="images/follistatin/front.png"
       onerror="this.style.display='none'">

  <img src="images/follistatin/back.png"
       onerror="this.style.display='none'">

  <img src="images/follistatin/front-side.png"
       onerror="this.style.display='none'">

  <img src="images/follistatin/side-back.png"
       onerror="this.style.display='none'">

  <img src="images/follistatin/unbox.png"
       onerror="this.style.display='none'">

</section>

<div class="error-box">
  اگر عکس‌ها نمایش داده نمی‌شوند → مشکل از نام فایل یا پسوند (.png) است
</div>

<footer>
  Contact: bluerexall@gmail.com
</footer>

</body>
</html>
