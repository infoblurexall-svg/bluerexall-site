<head>

      padding: 30px;

    .info {

      margin: auto;
      padding: 20px;
      line-height: 1.6;
    }

      padding: 20px;

  <h1>Follistatin</h1>
  <p>Research Use Only - Biotechnology Protein</p>
</header>

<section class="gallery">

  <img src="images/follistatin/front.png" onerror="this.style.display='none'">
  <img src="images/follistatin/back.png" onerror="this.style.display='none'">
  <img src="images/follistatin/front-side.png" onerror="this.style.display='none'">
