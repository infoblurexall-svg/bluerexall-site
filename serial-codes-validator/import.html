<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Import Serial Codes</title>
<style>
body{
    font-family: Arial;
    background:#0b0f19;
    color:white;
    text-align:center;
    padding:50px;
}
input,button{
    padding:12px;
    margin:10px;
}
button{
    background:#00bfff;
    border:none;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<h2>Import Excel Serial Codes</h2>

<input type="file" id="file" />
<br>
<button onclick="upload()">Upload & Import</button>

<pre id="log"></pre>

<script>
async function upload() {

    const file = document.getElementById('file').files[0];
    const formData = new FormData();
    formData.append("file", file);

    document.getElementById("log").innerText = "Uploading...";

    const res = await fetch("/api/import", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    document.getElementById("log").innerText =
        JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
