<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serial Codes Validator | Bluerexall</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <img src="/images/logo.png" alt="Bluerexall" class="logo">

    <h1>Serial Codes Validator</h1>

    <p class="subtitle">
        Verify the authenticity of your Bluerexall research product.
    </p>

    <form id="serialForm">

        <input
            id="serialInput"
            type="text"
            placeholder="Enter Serial Number"
            autocomplete="off"
            required
        >

        <button type="submit">
            Verify
        </button>

    </form>

    <div id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
