<script>
  const form = document.getElementById("validatorForm");
  const input = document.getElementById("verifyCode");
  const result = document.getElementById("result");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const code = input.value.trim();

    result.className = "result-box";
    result.textContent = "در حال بررسی...";

    try {
      const response = await fetch("/api/verify", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ code })
      });

      const data = await response.json();

      if (data.ok) {
        result.className = "result-box success";
        result.innerHTML = `<strong>${data.code}</strong><br>${data.message}`;
      } else {
        result.className = "result-box error";
        result.textContent = data.message;
      }
    } catch (err) {
      result.className = "result-box error";
      result.textContent = "ارتباط با سرور برقرار نشد.";
    }
  });
</script>
